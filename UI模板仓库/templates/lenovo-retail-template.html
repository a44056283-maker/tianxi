<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>联想智慧零售 UI 模板预览</title>
    <link rel="stylesheet" href="./assets/retail-ui-kit.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="side-nav">
        <div class="brand-lockup">
          <div class="brand-mark">L</div>
          <div>
            <strong>联想智慧零售</strong>
            <span>商业专业版 UI Kit</span>
          </div>
        </div>
        <nav class="nav-group" data-nav aria-label="主模块导航"></nav>
      </aside>

      <main class="main">
        <header class="top-bar">
          <div class="module-title">
            <h1 data-module-title>商品零售</h1>
            <span data-module-subtitle>商品零售 / 概览</span>
          </div>
          <div class="global-actions">
            <input class="search-input" placeholder="搜索 SKU、PN、SN、型号、订单号、金额">
            <button class="btn">昨天</button>
            <button class="btn">今天</button>
            <button class="btn primary">确认筛选</button>
          </div>
        </header>

        <section class="workflow-tabs" data-flows aria-label="当前模块子流程"></section>
        <section class="content-grid" data-content></section>
      </main>
    </div>
    <script src="./assets/retail-ui-kit.js"></script>
  </body>
</html>
