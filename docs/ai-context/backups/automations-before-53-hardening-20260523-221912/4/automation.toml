# 2026-05-23 智店通出入库/供应商/销售价硬规则：
# 1. 凡是 `CGR*`、`商品入库`、`采购入库`、`库存流水单` 单据，必须归类到采购入库，禁止显示到销售出库。
# 2. 当天销售金额同步必须合并当天全部 `orderData*.xlsx` 与 `orderProductData*.xlsx`，禁止只读取一个最新文件。
# 3. 出库流水金额参考优先读取 SQL `sales_order_line.deal_price`；没有单品价时才允许回退订单总额；源文件缺失时只能写 `executed_not_closed`，不得把 `0` 或空白金额写成完成。
# 4. `sales_order / sales_order_line` 是派生表，每轮必须按当天源数据重建，禁止保留旧轮误写结果。
# 5. 销售单业务日期优先按单号前缀反推；禁止把历史 `XS` 单误写为今天。
# 6. 供应商字段源导出为空但智店通可见入库页已人工核实时，必须手工回填到 `latest-serial-overrides.json`、`latest-inventory-movements.json` 和 SQL 映射结果。
# 7. 收口前必须打开前端 `出库流水 / 入库流水` 页面复核：入库单不得挂在出库、供应商不得无故待补、已有源文件的金额不得继续为 0/待补。
