prompt = "进入 `/Users/luxiangnan/Desktop/联想智慧零售项目/lenovo-smart-retail-cockpit`。先读取 `AGENTS.md`、`docs/ai-context/13_SCHEDULED_TASK_SOPS.md`、`docs/ai-context/07_BROWSER_WORKFLOW.md`、`docs/ai-context/04_NEXT_ACTIONS.md`、`docs/ai-context/09_CODEX_HANDOFF.md`。\n\n本任务是每天凌晨 4 点竞品排行真实采集任务。目标不是脚本触发，而是当天京东自营店铺销量排行和详情页数据完整收口。\n\n最高硬规则：每次触发都必须重新进入京东自营店铺，重新进入指定分类，重新切换销量排序，重新按当天页面顺序采集每个商品的真实数据。不得沿用昨日排行、旧 JSON、旧链接顺序、旧详情页价格、旧活动文案来冒充当天排行。旧链接仓库只允许做二次核价和掉榜/失效对比，不能作为当天排行来源。\n\n风控安全硬规则：禁止脚本式高速采集、禁止批量连续打开详情页、禁止无停顿快速点击、禁止无头浏览器、禁止自动扫描 DOM 冒充采集、禁止新浏览器 Profile。必须使用 Chrome 现有登录会话和可见页面，按类人节奏操作：每次点击、滚动、进入详情页、返回列表页之间必须自适应停顿；页面加载慢、价格区未展开、活动区未出现时必须等待；连续打开详情页必须降低频率。若出现快速验证、验证码、403、滑块、安全验证、页面空白、账号异常或页面风控提示，立即停止当前品牌/分类路径，保存截图和已完成证据，状态写 `blocked_page_risk` 或 `executed_not_closed`，不得硬闯，不得继续高频尝试。\n\n固定采集目标总数必须是 100 条：\n1. 联想京东自营 `https://lenovo1.jd.com/`：轻薄笔记本 TOP10、游戏笔记本 TOP10、平板电脑 TOP10，共 30 条。\n2. THINK：ThinkPad 京东自营店，轻薄笔记本 TOP10、游戏笔记本 TOP10，共 20 条。\n3. 华硕：华硕京东自营官方旗舰店，轻薄笔记本 TOP10、游戏笔记本 TOP10，共 20 条。\n4. 惠普：惠普京东自营旗舰店，轻薄笔记本 TOP10、游戏笔记本 TOP10，共 20 条。\n5. 华为：华为京东自营旗舰店，轻薄笔记本 TOP10，共 10 条。\n\n必须执行的真实流程：\n1. 运行 `cd apps/inventory-sync && npm run build:competitor-collection-plan` 生成当天路线图；这只作为路线图，不算完成。\n2. 按路线图用可见 Chrome 现有登录会话逐个进入店铺，进入对应分类或店内搜索对应口径，切换到销量排序，按当天页面顺序采 TOP 位次。\n3. 每个排行商品必须手动打开列表页和详情页核验，完整写入以下字段：`brand`、`rankingBucket`、`rank`、`productName`、`configSummary`、`salesVolumeText`、`jdUrl`、`jdSelfPrice`、`jdPreSubsidyPrice`、`jdSubsidyPrice`、`activityNotes`、`educationSubsidyNotes`、`capturedAt`、`sourceFile`、`sourceStoreName`、`storeScope=\\"jd-self-operated-store\\"`、`note`。\n4. `rankingBucket` 必须按分类填写：轻薄笔记本=`light-notebook`，游戏笔记本=`gaming-notebook`，平板电脑=`tablet`。缺 `rankingBucket` 的记录不能算完整。\n5. 详情页活动必须完整采集：店铺券、满减、秒杀、PLUS、教育优惠、国补、限时活动、到手价说明。没有看到额外活动也要写 `activityNotes: [\\"详情页未见额外店铺活动\\"]`，不能空着。\n6. 链接配置必须更新：当旧链接下架、失效、跳转错误、配置不符、不在当天销量榜时，必须从当天销量排序结果中替换为新的有效商品链接；不得保留虚假旧链接。\n7. 当天手工结果必须保存到 `apps/inventory-sync/artifacts/manual/competitor-monitor-YYYY-MM-DD.json`。如果少于 100 条，必须列出缺口品牌、缺口分类、缺口位次和阻塞原因，状态只能写 `blocked_missing_input`、`blocked_page_risk` 或 `executed_not_closed`。\n8. 采集完成后运行 `cd apps/inventory-sync && npm run parse:competitor-monitor -- artifacts/manual/competitor-monitor-YYYY-MM-DD.json`，再运行 `cd apps/inventory-sync && npm run run:scheduled-task -- daily-competitor-monitor-check` 收口。\n9. 收口后必须检查 `apps/web-cockpit/public/data/latest-competitor-monitor.json.completenessAudit`。只有 `completenessAudit.status = complete`、`expectedTotalCount = 100`、`actualItemCount = 100`，且品牌结构为联想京东自营 30 条、THINK 20 条、华硕 20 条、惠普 20 条、华为 10 条，才能汇报 `real_completed`。\n10. 若 `completenessAudit.status != complete`，必须按审计结果汇报 `missingItemCount`、`missingBrandCount`、`missingBucketCount`、`incompleteItemCount`、`staleItemCount` 和 blockers，不得写 `real_completed`。\n\n完成汇报必须按品牌和分类列出：采集条数、缺失链接数、缺失价格数、缺失活动数、缺失 `rankingBucket` 数、替换失效链接数、阻塞页面数、输出 JSON 路径、前端快照路径、`completenessAudit` 摘要。如果遇到登录、验证码、403、滑块、安全验证或页面无法打开，立即停止该品牌/分类路径，状态写 `blocked_page_risk`；已完成的品牌仍保存证据，未完成品牌列入人工阻塞。\n\n\n\nSQL/API严格映射门禁：前端数据读取默认必须使用 API strict 映射（`VITE_INVENTORY_QUOTE_DATA_MODE=api_strict`），禁止把 `/public/data/*.json` 静态快照当作实时口径；API 不可用时只能如实标记 `executed_not_closed` 或 `blocked_page_risk`，不得以静态回退伪装实时完成。所有采集写入后必须先确认 API 返回已更新，再做前端页面可见审计。\n\n前端页面可见审计硬规则：所有定时任务在完成采集、解析、导入、数据库/JSON 同步和快照重建后，必须打开真实前端页面 `http://127.0.0.1:5174/` 或当前用户实际访问的域名页面进行可见审计。不能只看 JSON、日志、报告、接口返回或脚本状态。必须进入本任务对应的前端子书签/页面，确认页面文本真实显示本轮最新数据、关键单号/SN/SKU/金额/服务费/价格/链接/库存数量。页面没打开、页面仍旧数据、对应子书签看不到本轮关键数据、或只在 JSON 中存在但 UI 不显示，任务只能写 `executed_not_closed`，不能写 `real_completed`。汇报必须写清打开的前端 URL、进入的子书签、页面上亲眼看到的关键字段和截图/文本证据。\n\n\n2026-05-23 退单回库/供应商硬规则：1. 智店通同步在销售出库、商品入库、其他出库、库存流水、SN库存订单后，必须再打开同日线下门店退单页面，按当天日期范围检查已完成退单；存在已完成退单时，必须把对应 SN 重新同步为回库流水，再允许写 real_completed。2. 当前阶段若入库或退单回库供应商为空，统一补 联想，并同步写入 JSON、主表和 SQL。3. 若线下门店退单已完成且 SN库存订单 已出现回库轨迹，但 商品库存SN统计 尚未回显，允许按 transfer_inbound + SN库存订单 + 可见退单完成页 临时纳入当前在库，但必须在汇报中写明待下一轮智店通总表自动收敛。\n\n2026-05-23 主标题统一映射硬规则：零售英雄卡主标题是库存台账、出入库、非零售出库、历史营销/教育活动、价保、教育补代扫、报价来源等所有 SKU 展示页面的统一标题口径，禁止继续使用智店通简称作为最终标题。标题优先级固定为：京东 exact match 完整标题（主标题+副标题/配置副标题） -> 联想官旗 exact match 完整标题 -> 天猫/淘宝 exact match 完整标题 -> 当日群报价或人工确认的完整机型标题 -> 最后才允许智店通简称临时兜底。只要已有完整标题，任何任务都不得再用智店通简称覆盖回去。完整标题已包含 CPU、内存、硬盘、显卡、屏幕、颜色等关键信息时，禁止再把 matchedConfig 或斜杠配置重复拼到标题后形成双重配置。若标题仍为简称或双重配置，必须回到已登录可见页面手动展开标题区补齐，并同步写回零售标题映射源；同时复核 实时零售报价、库存详情-库存台账、出库流水/入库流水、产品价保-历史营销/教育活动 四处同 SKU 标题已一致后，才能写 real_completed，否则只能写 executed_not_closed。"
