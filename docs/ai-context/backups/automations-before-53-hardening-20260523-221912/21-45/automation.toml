prompt = "进入 `/Users/luxiangnan/Desktop/联想智慧零售项目/lenovo-smart-retail-cockpit`。先读取 `AGENTS.md`、`docs/ai-context/13_SCHEDULED_TASK_SOPS.md`、`docs/ai-context/07_BROWSER_WORKFLOW.md`。\n\n本任务是智店通出入库 + 网页微信 `智店通入库群` 教育补代扫同步，营业日 `11:15-21:45` 每 45 分钟执行一轮，`22:00` 闭店前以 `21:45` 为最后一轮。采集本体必须是 Chrome 当前已登录可见界面的手动低频操作；本地命令只允许在取得可见页面证据后做导入、重建、校验和报告，不得把脚本当采集器。唯一同步命令入口是 `bash scripts/run_scheduled_task.sh zhidiantong-sync-cycle`；禁止调用、恢复或新增旧任务名 `zhidiantong-sync-12/15/19`。\n\n进入任何智店通页面前，必须先使用 Chrome 当前已登录网页微信 `https://localhost:3001/`，从当前会话列表或右侧信息栏入口直接点击进入 `智店通入库群`，禁止使用搜索栏搜索群名。进入后扫描当天教育补代扫出库产品照片/箱码；全量图片穷尽扫描规则：子智能体不能只按固定步骤滑动几下，要自行判断是否仍有遗漏。进入智店通入库群后，必须以“上次已确认的最后一张代扫教育补箱码图片”为边界，先向历史方向滚动，遇到每一张图片、缩略图、上传状态卡、箱码截图都必须逐张打开或放大确认，记录时间、发送人、图片序号、是否箱码、是否教育补代扫、可见 SKU/PN/SN/型号；再向最新消息方向复扫一遍，确认没有被消息遮挡、半截露出或左侧历史消息区漏掉的图片。必须至少完成“历史方向扫描 + 最新方向复扫 + 可疑区域二次回扫”三段动作。只有每张图片都扫完，并且一直扫到最后一次更新箱码代扫教育补的箱子，才算群采集任务完成。只扫当前屏幕、只扫一两张图、没有打开可疑缩略图、没有记录图片清单、没有二次复扫，均只能写 executed_not_closed，不能写 real_completed 或 confirmedNoNewRecords。采集结束后必须同步并复核前端公开数据：销售单流水、出入库流水、群教育补代扫服务费、库存数量、可售数量、SN 扣减和入库 SN 都必须在前端 JSON 与 UI 中可见；采购入库后，新增或在库 SKU 的库存详情中“库存进货价”也必须同步显示。若 SN/入库单已导入但前端库存详情仍显示待补、缺成本或空值，本轮只能写 executed_not_closed，不能写 real_completed。任一项没更新，只能写 executed_not_closed，不能写 real_completed。追溯扫描硬规则：智店通入库群教育补代扫不是只看当前屏幕；每轮必须从上次成功扫描时间、上次阻塞时间或上次未扫描时间节点开始，向上滚动补扫历史图片，再向下回到最新消息，直到覆盖到本轮执行时间。图片缩略图被新消息遮挡、只露出一部分、箱码不完整或看不清时，必须打开图片或继续滚动定位，不能因为当前屏幕看不到外箱码就判断无箱码。只有完整覆盖时间段且确认没有新箱码/图片后，才允许落盘 confirmedNoNewRecords；否则只能写 executed_not_closed 或 blocked_missing_visible_box_code。有记录则落盘 `apps/inventory-sync/artifacts/manual/education-agent-scan/education-agent-scan-YYYY-MM-DD-*.json`；确无新增也必须落盘同日 `confirmedNoNewRecords` 确认文件。没有同日群记录或无新增确认时，本轮只能写 `executed_not_closed`，不能写 `real_completed`。\n\n随后用 Chrome 现有登录会话进入智店通，五个页面必须全部选择当天开始日期和当天结束日期并点击查询：销售/零售出库、商品入库、其他出库/出入库、库存流水、SN库存订单。未选当天起止日期并查询，不允许判断当天无销售、无入库、无出库或无 SN 流水。页面支持导出时，手动导出当天文件；页面只可查看时，保存页面证据和筛选条件。\n\n风控降频硬规则：禁止脚本式采集、禁止无头浏览器、禁止新浏览器 Profile、禁止批量连续打开详情页、禁止高频点击、禁止 DOM 自动扫描冒充采集。必须使用用户当前已登录 Chrome 可见窗口低频类人操作；每次点击、滚动、输入、查询、打开详情页、返回列表之间必须按页面状态自适应停顿。出现 403、快速验证、验证码、滑块、安全验证、白屏、账号异常、持续转圈或明显卡顿，立即停止，状态只能写 `blocked_page_risk` 或 `executed_not_closed`。\n\n取得当天可见证据或导出文件后，才允许运行 `bash scripts/run_scheduled_task.sh zhidiantong-sync-cycle` 做本地导入、重建和校验。汇报必须写清：网页微信群代扫教育补前置扫描结果、每个智店通页面是否选择当天日期、导出文件、导入条数、库存总表/SN总表是否同日成对、库存数量/SN一致性、营销PO/教育补/代扫联动指标，以及前端销售单流水、出入库流水、教育补代扫服务费、库存数量、可售数量、SN 扣减和入库 SN 的复核结果。\n\n\n\nSQL/API严格映射门禁：前端数据读取默认必须使用 API strict 映射（`VITE_INVENTORY_QUOTE_DATA_MODE=api_strict`），禁止把 `/public/data/*.json` 静态快照当作实时口径；API 不可用时只能如实标记 `executed_not_closed` 或 `blocked_page_risk`，不得以静态回退伪装实时完成。所有采集写入后必须先确认 API 返回已更新，再做前端页面可见审计。\n\n前端页面可见审计硬规则：所有定时任务在完成采集、解析、导入、数据库/JSON 同步和快照重建后，必须打开真实前端页面 `http://127.0.0.1:5174/` 或当前用户实际访问的域名页面进行可见审计。不能只看 JSON、日志、报告、接口返回或脚本状态。必须进入本任务对应的前端子书签/页面，确认页面文本真实显示本轮最新数据、关键单号/SN/SKU/金额/服务费/价格/链接/库存数量。页面没打开、页面仍旧数据、对应子书签看不到本轮关键数据、或只在 JSON 中存在但 UI 不显示，任务只能写 `executed_not_closed`，不能写 `real_completed`。汇报必须写清打开的前端 URL、进入的子书签、页面上亲眼看到的关键字段和截图/文本证据。\n\n\n2026-05-23 退单回库/供应商硬规则：1. 智店通同步在销售出库、商品入库、其他出库、库存流水、SN库存订单后，必须再打开同日线下门店退单页面，按当天日期范围检查已完成退单；存在已完成退单时，必须把对应 SN 重新同步为回库流水，再允许写 real_completed。2. 当前阶段若入库或退单回库供应商为空，统一补 联想，并同步写入 JSON、主表和 SQL。3. 若线下门店退单已完成且 SN库存订单 已出现回库轨迹，但 商品库存SN统计 尚未回显，允许按 transfer_inbound + SN库存订单 + 可见退单完成页 临时纳入当前在库，但必须在汇报中写明待下一轮智店通总表自动收敛。

2026-05-23 主标题统一映射硬规则：零售英雄卡主标题是库存台账、出入库、非零售出库、历史营销/教育活动、价保、教育补代扫、报价来源等所有 SKU 展示页面的统一标题口径，禁止继续使用智店通简称作为最终标题。标题优先级固定为：京东 exact match 完整标题（主标题+副标题/配置副标题） -> 联想官旗 exact match 完整标题 -> 天猫/淘宝 exact match 完整标题 -> 当日群报价或人工确认的完整机型标题 -> 最后才允许智店通简称临时兜底。只要已有完整标题，任何任务都不得再用智店通简称覆盖回去。完整标题已包含 CPU、内存、硬盘、显卡、屏幕、颜色等关键信息时，禁止再把 matchedConfig 或斜杠配置重复拼到标题后形成双重配置。若标题仍为简称或双重配置，必须回到已登录可见页面手动展开标题区补齐，并同步写回零售标题映射源；同时复核 实时零售报价、库存详情-库存台账、出库流水/入库流水、产品价保-历史营销/教育活动 四处同 SKU 标题已一致后，才能写 real_completed，否则只能写 executed_not_closed。"
