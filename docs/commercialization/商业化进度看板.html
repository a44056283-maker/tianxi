    :root {

    * { box-sizing: border-box; }
    body {

      padding: 28px 24px 56px;

      padding: 24px;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .hero-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-content: start;
    }
    .metric {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 14px;
      min-height: 84px;
    }
    .metric .label { font-size: 12px; opacity: 0.84; }
    .metric .value { font-size: 28px; font-weight: 700; margin-top: 10px; }
    .layout {
      display: grid;
      grid-template-columns: 1.25fr 0.95fr;
      gap: 20px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    .panel + .panel { margin-top: 20px; }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .subtle {
      color: var(--muted);
      font-size: 13px;
    }
    .bar-list { display: grid; gap: 14px; }
    .bar-row { display: grid; gap: 6px; }
    .bar-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
    }
    .bar-track {
      width: 100%;
      height: 12px;
      background: #ecf0f7;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #2b6fff 0%, #57a0ff 100%);
      border-radius: 999px;
    }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .tag {
      padding: 6px 10px;
      background: var(--surface-soft);
      border: 1px solid #cdddff;
      border-radius: 999px;
      font-size: 12px;
      color: #274387;
    }
    ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      vertical-align: top;
      text-align: left;
    }
    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 12px;
    }
    .tone-danger { color: var(--danger); }
    .tone-warn { color: var(--warn); }
    .tone-good { color: var(--good); }
    @media (max-width: 980px) {
      .hero, .layout {
        grid-template-columns: 1fr;
      }
      .hero-meta {
