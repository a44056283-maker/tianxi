<body>
  <div class="stage"><div class="pos" id="pos">
    <header class="top">
      <div class="brand"><span class="logo">Lenovo</span><div><h1>智慧收银端</h1><p>进销存、价签同步</p></div></div>
      <div class="search"><input id="query" placeholder="扫 SN / 输 SKU / 商品名" autocomplete="off"><button class="btn" onclick="applySearch()">搜索</button><button class="btn light" onclick="resetSearch()">重置</button></div>
      <div class="metrics"><div class="metric"><span>可售 SKU</span><strong id="mSku">--</strong></div><div class="metric"><span>可售 SN</span><strong id="mSn">--</strong></div><div class="metric"><span>同步状态</span><strong id="mSync">读取中</strong></div><button class="top-action" onclick="openOrders()">订单</button><button class="top-action" onclick="openLotteryPage()">抽奖</button><button class="top-action warn-top" onclick="downloadPosOfflineBundle()">更新</button><button class="top-action secondary-top" onclick="showPriceTagNotice()">价签</button><button class="top-action danger-top" onclick="exitPosApp()">退出</button></div>
    </header>

      <aside class="panel cart"><div class="cart-head"><div><h2>待出库占位</h2><small>选商品 + 选 SN，给智店通扫码出库</small></div><button class="chip" onclick="clearCart()">清空</button></div><div class="cart-list" id="cart"></div><div class="out-no" id="finalPriceBoard"><span>最终到手价</span><strong id="orderNo">待选择商品</strong></div><div class="total"><span>出库状态</span><strong id="total">等待选择 SN</strong><em id="msg">点击商品查看配置，再从 SN 池选择序列号。</em></div><div class="actions"><button class="secondary" onclick="openOrders()">占位记录</button><button class="checkout" onclick="submitOrder()">生成出库占位</button></div></aside>

<script>
var products=[], serials=[], inventorySnapshot={skus:[],totals:{}}, salesOrders=[], syncTasks=[], salesStaff=[], stagedOrders=[], marketingActivities=[], storeManualPromotions=[], cart=[], filtered=[], activeCategory='全部', activeQuick='全部型号', queryText='', snQuery='', orderSearchText='', orderStatusFilter='all', orderSortKey='newest', productPage=0, categoryPage=0, quickPage=0, selectedProduct=null, selectedSn=null, deferredInstallPrompt=null, installBannerDismissed=false, autoInstallGuideShown=false, activeCodeKey='', activeCodeTitle='', lotteryDashboard=null, lotteryEntryUrl='', lotteryLanBaseUrl='', lotteryBusy=false, lotteryStageState='idle', lotteryStageTitle='等待客户扫码报名', lotteryStageDesc='正式抽奖认购机 SN；模拟抽奖只做互动体验，不占正式奖池。', lotteryStageLabel='等待开抽', lotteryStageHint='客户扫码报名后可在收银端现场开奖', lotteryLatestResult=null, lotteryStatusTone='good', lotteryStatusText='正在读取抽奖数据...', offlineBundleSyncing=false, offlineBundleMeta=null;

function posText(p){return ((p.category||'')+' '+(p.name||'')+' '+(p.pn||'')+' '+(p.skuKey||'')).toLowerCase()}
function isPhoneProduct(p){var t=posText(p);if(/moto buds|buds|tws|耳机|音箱|支架|手写笔|保护夹|保护壳|钢化膜|贴膜|键盘/.test(t))return false;return /phn moto|摩托罗拉|联想moto|\bmoto\s?(edge|g|razr|s50|x70)|智能手机|老人机|拯救者手机|(^|\\s)手机(\\s|$)|折叠机|直板机/.test(t)}

function posCategory(p){var raw=p.category||'', t=posText(p);if(/电脑配件|耳机音箱|打印机/.test(raw))return '电脑配件';if(isAccessoryProduct(p))return /平板|pad|tablet|y700/.test(t)?'平板配件':'电脑配件';if(raw==='游戏笔记本')return '游戏笔记本';if(raw==='轻薄笔记本')return '轻薄笔记本';if(raw==='平板电脑')return '平板电脑';if(raw==='平板配件')return '平板配件';if(raw==='手机')return '智能生活';if(raw==='智能生活'||isPhoneProduct(p))return '智能生活';if(raw==='商务台式'||raw==='游戏主机'||raw==='一体机'||raw==='台式/一体机')return '台式/一体机';if(raw==='显示器')return '显示器';if(/显示器|显示屏|monitor|67ce/.test(t))return '显示器';if(/台式\/一体机|商务台式|游戏主机|一体机|台式|主机|天逸|aio/.test(t))return '台式/一体机';if(/平板电脑|平板|pad|tablet|y700|zae|tb/.test(t))return '平板电脑';if(/游戏笔记本|拯救者|legion|y7000|y9000|r7000|r9000|rtx|电竞/.test(t))return '游戏笔记本';if(/轻薄笔记本|小新|thinkbook|thinkpad|ideapad|air|pro14|pro16|笔记本/.test(t))return '轻薄笔记本';return '电脑配件'}
function accessoryTier(p){var t=posText(p);if(/固态|ssd|内存|硬盘|扩容|显卡|硬件升级/.test(t))return '高价值升级件';if(/适配器|充电器|氮化镓|type-c|电源|扩展坞|拓展坞|dock/.test(t))return '电源扩展';if(/键盘|机械键盘|键鼠|鼠标|电竞鼠标|手柄/.test(t))return '键鼠操控';if(/耳机|音箱|音响|麦克风|摄像头|ai智能耳机/.test(t))return '音频会议';if(/包|双肩|背包|保护套|贴膜|支架|散热|手写笔/.test(t))return '低客单附件';return '通用配件'}

function deleteBackendOrder(orderId,stagedIndex){if(!orderId)return;var tip='确认删除未在智店通出库的占位销售单 '+orderId+'？\n将同时回收本地 SQL 销售单、库存流水、同步任务和对应 SN 状态。';if(!confirm(tip))return;if(!confirm('二次确认：这笔单还没有在智店通真实出库，现在立即删除吗？'))return;xhr('DELETE','/api/sales/orders/'+encodeURIComponent(orderId),null,function(result){if(typeof stagedIndex==='number'&&stagedIndex>=0&&stagedIndex<stagedOrders.length)stagedOrders.splice(stagedIndex,1);else stagedOrders=stagedOrders.filter(function(item){return String(item.backendOrderId||'')!==String(orderId)});salesOrders=salesOrders.filter(function(item){return String(item.id||item.order_id||'')!==String(orderId)});syncTasks=syncTasks.filter(function(item){return String(item.entity_id||item.entityId||'')!==String(orderId)&&String(item.id||'')!=='SYNC-'+String(orderId)});saveStagedOrders();renderOrdersDialog();refreshRetailDataAfterOrder();msg('已删除未出库占位销售单：'+orderId)},function(x){msg('删除失败：'+parseXhrError(x))})}
function deleteStagedOrder(i){var o=stagedOrders[i];if(!o)return;o=normalizeStagedOrder(o);if(o.backendOrderId){deleteBackendOrder(o.backendOrderId,i);return}var tip='确认删除占位订单 '+o.id+'？\n删除后只移除本地占位记录，不会删除智店通或已出库业务单。';if(!confirm(tip))return;if(!confirm('二次确认：现在立即删除这笔本地占位记录吗？'))return;stagedOrders.splice(i,1);saveStagedOrders();renderOrdersDialog();msg('已删除本地占位记录')}
function buildCodeModalCard(label,value,tip){return '<div class="code-card" onclick="closeCodeModal()"><div class="code-card-head"><span>'+esc(label)+'</span><button class="btn light" style="height:34px;padding:0 14px;font-size:13px" onclick="event.stopPropagation();closeCodeModal()">关闭</button></div><div class="code-bar">'+barcodeSvg(value,'modal')+'</div><strong>'+esc(value)+'</strong>'+(tip?'<small>'+esc(tip)+'</small>':'')+'</div>'}function openCodeModal(title,content,key){document.getElementById('codeModalTitle').innerHTML=title;document.getElementById('codeModalBody').innerHTML=content;document.getElementById('codeModal').className='modal show';activeCodeKey=key||'';activeCodeTitle=title||''}function closeCodeModal(){document.getElementById('codeModal').className='modal';activeCodeKey='';activeCodeTitle=''}function openProductCodeModal(kind){if(!selectedProduct)return;var value=kind==='sku'?(selectedProduct.skuKey||'待补'):(selectedProduct.pn||selectedProduct.skuKey||'待补');var title=kind==='sku'?'SKU 一维码':'PN / MTM 一维码';var key=kind+':'+value;if(activeCodeKey===key){closeCodeModal();return}openCodeModal(title,buildCodeModalCard(kind==='sku'?'SKU':'PN / MTM',value,''),key)}function openSnCodeModal(sn){if(!sn)return;var key='sn:'+sn;if(activeCodeKey===key){closeCodeModal();return}openCodeModal('SN 序列号扫码条码',buildCodeModalCard('SN',sn,''),key)}function closeModal(){document.getElementById('modal').className='modal';document.querySelector('#modal .dialog').className='dialog';document.getElementById('addSnFooter').style.display='none';closeCodeModal()}
function showPriceTagNotice(){document.getElementById('modalTitle').innerHTML='电子价签接口预留';document.getElementById('addSnFooter').style.display='none';document.getElementById('modalBody').innerHTML='<div class="empty">收银端已预留价签入口。正式使用时将从本地商品价格生成价签更新任务，再经汉朔云服务或厂家接口下发。当前不直接调用价签云端。</div>';document.getElementById('modal').className='modal show'}
function fitViewport(){var baseW=1366,baseH=768,pad=24;var vv=window.visualViewport;var vw=(vv&&vv.width?vv.width:window.innerWidth)-pad;var vh=(vv&&vv.height?vv.height:window.innerHeight)-pad;var scale=Math.min(vw/baseW,vh/baseH,1);if(!Number.isFinite(scale)||scale<=0)scale=1;document.documentElement.style.setProperty('--pos-scale',String(scale))}
function registerPosLiteServiceWorker(){if(!('serviceWorker' in navigator))return;navigator.serviceWorker.register('/sw-pos-lite.js?v=202606041745',{scope:'/'}).catch(function(err){console.warn('pos lite service worker register failed',err)})}
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredInstallPrompt=e;installBannerDismissed=false;syncInstallBanner()});window.addEventListener('appinstalled',function(){deferredInstallPrompt=null;installBannerDismissed=true;syncInstallBanner();msg('收银应用已安装，可从桌面快捷方式直接打开')});document.getElementById('query').addEventListener('keydown',function(e){if(e.key==='Enter')applySearch()});window.addEventListener('resize',fitViewport);if(window.visualViewport){window.visualViewport.addEventListener('resize',fitViewport);window.visualViewport.addEventListener('scroll',fitViewport)}fitViewport();registerPosLiteServiceWorker();loadStagedOrders();load();setInterval(refreshSqlFeeds,15000);syncInstallBanner();scheduleInstallGuide();
