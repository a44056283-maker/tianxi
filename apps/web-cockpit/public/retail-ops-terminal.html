<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#b91c1c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="零售终端">
  <link rel="manifest" href="/retail-ops-terminal.webmanifest?v=202605271430">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon-192.png?v=202605271430">
  <title>联想智慧零售终端</title>
  <style>
    :root {
      --bg: #09111f;
      --panel: rgba(13, 24, 44, 0.94);
      --panel-soft: rgba(17, 32, 58, 0.88);
      --line: rgba(148, 163, 184, 0.18);
      --text: #e5edf8;
      --muted: #91a4c4;
      --danger: #fb7185;
      --warn: #f59e0b;
      --ok: #22c55e;
      --accent: #ef4444;
      --accent-soft: rgba(239, 68, 68, 0.14);
      --blue: #38bdf8;
      --blue-soft: rgba(56, 189, 248, 0.14);
      --purple: #a78bfa;
      --radius: 18px;
      --shadow: 0 20px 50px rgba(2, 6, 23, 0.38);
      --screen-w: 1600px;
      --screen-h: 900px;
      --screen-scale: 1;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background:
        radial-gradient(circle at 14% 10%, rgba(59, 130, 246, 0.22), transparent 32%),
        radial-gradient(circle at 88% 14%, rgba(239, 68, 68, 0.16), transparent 28%),
        linear-gradient(180deg, #08111f 0%, #0c1629 100%);
      color: var(--text);
    }

    button, input, select { font: inherit; }

    .stage {
      position: fixed;
      inset: 0;
      padding: 14px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .screen {
      width: var(--screen-w);
      height: var(--screen-h);
      transform: scale(var(--screen-scale));
      transform-origin: center center;
      background:
        linear-gradient(180deg, rgba(9, 17, 31, 0.98) 0%, rgba(7, 13, 24, 0.98) 100%);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: 86px 1fr 54px;
    }

    .screen.mobile {
      width: min(100vw, 430px);
      height: min(100vh, 932px);
      border-radius: 0;
      transform: none;
    }

    .topbar {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 360px;
      gap: 12px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(10, 20, 38, 0.96), rgba(10, 20, 38, 0.82));
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 72px;
      height: 42px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #b91c1c, #ef4444);
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1;
    }

    .brand-copy p {
      margin: 5px 0 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-center {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 140px 140px 132px;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .search-shell,
    .chip-button,
    .status-shell,
    .metric-card,
    .section-card,
    .rail-card,
    .table-card,
    .mini-card,
    .list-row,
    .pager-shell,
    .install-banner {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .search-shell {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      height: 52px;
      min-width: 0;
    }

    .search-shell input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
    }

    .search-shell input::placeholder {
      color: #6f85aa;
    }

    .chip-button {
      height: 52px;
      border-radius: 16px;
      color: var(--text);
      cursor: pointer;
      background: linear-gradient(180deg, rgba(17, 32, 58, 0.96), rgba(13, 24, 44, 0.96));
      font-size: 16px;
      font-weight: 800;
    }

    .chip-button.primary {
      background: linear-gradient(135deg, #b91c1c, #ef4444);
      border-color: rgba(248, 113, 113, 0.3);
    }

    .status-shell {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 10px 12px;
      min-width: 0;
    }

    .status-item strong,
    .metric-card strong,
    .section-card strong,
    .mini-card strong,
    .table-card strong {
      display: block;
      font-weight: 800;
    }

    .status-item strong {
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-item span,
    .metric-card span,
    .section-card span,
    .mini-card span,
    .table-card span,
    .list-row span,
    .footer strong {
      color: var(--muted);
    }

    .status-item span {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .workspace {
      min-height: 0;
      padding: 16px 18px;
      display: grid;
      grid-template-columns: 188px minmax(0, 1fr) 356px;
      gap: 14px;
    }

    .screen.module-serials .workspace {
      grid-template-columns: 188px minmax(0, 1fr);
    }

    .screen.module-serials .rail {
      display: none;
    }

    .screen.module-serials .board {
      grid-template-rows: auto 46px minmax(0, 1fr) 54px;
    }

    .screen.module-serials .metrics-grid {
      display: none;
    }

    .screen.module-serials .board-body {
      grid-template-columns: 1fr;
    }

    .screen.module-serials .section-card {
      min-height: 0;
    }

    .sidebar,
    .board,
    .rail {
      min-height: 0;
      display: grid;
    }

    .sidebar {
      grid-template-rows: 1fr;
      gap: 12px;
      overflow: hidden;
    }

    .module-stack,
    .rail-stack {
      display: grid;
      gap: 10px;
      min-height: 0;
      overflow: hidden;
    }

    .module-button {
      text-align: left;
      padding: 14px 14px 13px;
      cursor: pointer;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(17, 32, 58, 0.98), rgba(9, 17, 31, 0.98));
      color: var(--text);
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .module-button.active {
      border-color: rgba(248, 113, 113, 0.4);
      background:
        linear-gradient(180deg, rgba(185, 28, 28, 0.28), rgba(17, 32, 58, 0.96));
      transform: translateY(-1px);
    }

    .module-button strong {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
    }

    .module-button span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .module-button.active span {
      color: #f8c4c4;
    }

    .sidebar-foot {
      padding: 12px;
      font-size: 12px;
      line-height: 1.45;
    }

    .board {
      grid-template-rows: auto 96px 46px minmax(0, 1fr) 54px;
      gap: 12px;
      min-width: 0;
      overflow: hidden;
    }

    .board-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .board-title {
      min-width: 0;
    }

    .board-title h2 {
      margin: 0;
      font-size: 30px;
      line-height: 1;
    }

    .board-title p {
      margin: 8px 0 0;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .signal-badge {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #fecaca;
      border: 1px solid rgba(248, 113, 113, 0.22);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      height: 96px;
      min-height: 96px;
      overflow: hidden;
    }

    .metric-card {
      padding: 14px 16px;
      min-width: 0;
      min-height: 96px;
      background:
        linear-gradient(180deg, rgba(18, 33, 58, 0.98), rgba(10, 19, 35, 0.98));
    }

    .metric-card strong {
      font-size: 28px;
      line-height: 1;
      margin-top: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric-card span {
      display: block;
      font-size: 12px;
      letter-spacing: 0;
    }

    .metric-card em {
      display: block;
      font-style: normal;
      font-size: 11px;
      margin-top: 8px;
      color: #bfd0eb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subnav {
      display: flex;
      gap: 8px;
      min-width: 0;
      height: 46px;
      min-height: 46px;
      overflow: hidden;
    }

    .subnav button {
      min-width: 0;
      flex: 1;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(15, 28, 49, 0.98);
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subnav button.active {
      background: linear-gradient(135deg, rgba(185, 28, 28, 0.28), rgba(59, 130, 246, 0.22));
      border-color: rgba(59, 130, 246, 0.28);
      color: var(--text);
    }

    .board-body {
      min-height: 0;
      height: 100%;
      overflow: hidden;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
    }

    .section-card,
    .table-card {
      padding: 14px 14px 12px;
      min-height: 0;
      display: grid;
      gap: 10px;
      overflow: hidden;
    }

    .section-card.hero {
      background:
        linear-gradient(160deg, rgba(185, 28, 28, 0.16), rgba(17, 32, 58, 0.98) 42%, rgba(11, 19, 35, 0.98));
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .section-head strong,
    .table-card strong {
      font-size: 16px;
    }

    .section-head span,
    .table-card span {
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      min-height: 0;
    }

    .mini-card {
      padding: 12px;
      min-height: 92px;
      background: var(--panel-soft);
    }

    .mini-card strong {
      font-size: 20px;
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-card span {
      display: block;
      font-size: 11px;
      line-height: 1.35;
    }

    .mini-card em {
      display: block;
      margin-top: 8px;
      font-style: normal;
      font-size: 11px;
      color: #c8d6ea;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-stack,
    .table-stack {
      display: grid;
      gap: 8px;
      min-height: 0;
      align-content: start;
    }

    .list-row,
    .table-row {
      min-width: 0;
      min-height: 0;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(12, 23, 41, 0.92);
      border: 1px solid var(--line);
    }

    .list-row strong,
    .table-row strong {
      display: block;
      font-size: 14px;
      line-height: 1.28;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-row span,
    .table-row span {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-row em,
    .table-row em {
      display: block;
      margin-top: 6px;
      font-style: normal;
      font-size: 11px;
      color: #c9d7eb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tone-danger { color: var(--danger); }
    .tone-warn { color: #fbbf24; }
    .tone-ok { color: #4ade80; }
    .tone-blue { color: #7dd3fc; }
    .tone-purple { color: #c4b5fd; }

    .pager-shell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      height: 54px;
    }

    .pager-shell button {
      height: 38px;
      min-width: 120px;
      border: 0;
      border-radius: 12px;
      background: rgba(17, 32, 58, 0.98);
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .pager-shell button:disabled {
      opacity: 0.34;
      cursor: default;
    }

    .pager-shell strong {
      flex: 1;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .rail {
      grid-template-rows: auto auto 1fr;
      gap: 10px;
    }

    .rail-card,
    .install-banner {
      padding: 14px;
    }

    .rail-card strong,
    .install-banner strong {
      display: block;
      font-size: 16px;
    }

    .rail-card span,
    .install-banner span {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
    }

    .path-list,
    .quick-actions,
    .keyword-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .path-list code,
    .keyword-list button {
      display: block;
      width: 100%;
      padding: 10px 11px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(12, 23, 41, 0.92);
      color: #d5e1f2;
      font-size: 11px;
      line-height: 1.35;
      word-break: break-all;
      text-align: left;
    }

    .keyword-list button {
      cursor: pointer;
      word-break: normal;
    }

    .quick-actions {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .action-list {
      display: grid;
      gap: 10px;
      margin-top: 2px;
    }

    .action-list button {
      min-height: 52px;
      border: 1px solid rgba(248, 113, 113, 0.24);
      border-radius: 16px;
      background:
        radial-gradient(circle at 18% 16%, rgba(248, 113, 113, 0.24), transparent 38%),
        linear-gradient(135deg, rgba(185, 28, 28, 0.34), rgba(17, 32, 58, 0.96));
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      text-align: left;
      padding: 0 16px;
    }

    .inventory-workbench {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      overflow: hidden;
    }

    .inventory-category-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      min-height: 0;
    }

    .inventory-category-grid button {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(12, 23, 41, 0.94);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      padding: 8px 10px;
      overflow: hidden;
    }

    .inventory-category-grid button.active {
      border-color: rgba(248, 113, 113, 0.5);
      background: linear-gradient(135deg, rgba(185, 28, 28, 0.36), rgba(30, 64, 175, 0.22));
    }

    .inventory-category-grid strong,
    .inventory-category-grid span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .inventory-category-grid strong {
      font-size: 13px;
    }

    .inventory-category-grid span {
      margin-top: 3px;
      font-size: 10px;
      color: #b9c7db;
    }

    .inventory-detail-list {
      display: grid;
      gap: 8px;
      min-height: 0;
      overflow: hidden;
      align-content: start;
    }

    .inventory-detail-row {
      min-height: 58px;
      display: grid;
      grid-template-columns: minmax(240px, 1.3fr) minmax(170px, 0.9fr) minmax(170px, 0.9fr) minmax(190px, 1fr);
      gap: 8px;
      align-items: stretch;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(12, 23, 41, 0.92);
      padding: 8px;
      overflow: hidden;
    }

    .inventory-detail-row > div {
      min-width: 0;
      overflow: hidden;
    }

    .inventory-detail-row strong,
    .inventory-detail-row span,
    .inventory-detail-row em {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-style: normal;
    }

    .inventory-detail-row strong {
      font-size: 13px;
      color: var(--text);
    }

    .inventory-detail-row span {
      margin-top: 4px;
      font-size: 11px;
      color: #c8d6ea;
    }

    .inventory-detail-row em {
      margin-top: 4px;
      font-size: 10px;
      color: var(--muted);
    }

    .quick-actions button {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(17, 32, 58, 0.98), rgba(10, 19, 35, 0.98));
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .install-banner {
      display: none;
      background: linear-gradient(135deg, rgba(185, 28, 28, 0.24), rgba(59, 130, 246, 0.18));
      border-color: rgba(248, 113, 113, 0.24);
    }

    .install-banner.show {
      display: block;
    }

    .install-banner button {
      margin-top: 10px;
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, #b91c1c, #ef4444);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 18px;
      border-top: 1px solid var(--line);
      background: rgba(8, 15, 27, 0.96);
      font-size: 12px;
    }

    .footer strong {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .footer-links {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .footer-links a {
      color: #c8d6ea;
      text-decoration: none;
      white-space: nowrap;
    }

    @media (max-width: 1180px) {
      html, body {
        overflow: hidden;
      }

      .stage {
        padding: 0;
      }

      .screen {
        width: 100vw;
        height: 100vh;
        transform: none;
        border-radius: 0;
        grid-template-rows: 82px 1fr 46px;
      }

      .topbar {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .topbar-center,
      .status-shell {
        grid-template-columns: 1fr;
      }

      .workspace {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .sidebar {
        grid-template-rows: auto;
      }

      .module-stack {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .sidebar-foot {
        display: none;
      }

      .board {
        order: 2;
        grid-template-rows: auto 96px auto minmax(0, 1fr) 54px;
      }

      .rail {
        order: 3;
      }

      .metrics-grid,
      .board-body {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 760px) {
      .screen {
        grid-template-rows: 152px minmax(0, 1fr) 42px;
      }

      .brand-copy h1 {
        font-size: 22px;
      }

      .workspace {
        padding: 12px;
      }

      .module-stack {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metrics-grid,
      .board-body,
      .summary-grid,
      .quick-actions {
        grid-template-columns: 1fr;
      }

      .subnav {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .board-title h2 {
        font-size: 25px;
      }

    const API_BASE_STORAGE_KEY = 'lenovo-retail-ops-terminal.api-base.v1'

    function currentApiBase() {
      const saved = localStorage.getItem(API_BASE_STORAGE_KEY)
      if (saved) return saved.replace(/\/$/, '')
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000'
      if (window.location.port === '5174') return `${window.location.protocol}//${window.location.hostname}:8000`
      return ''
    }

    function buildDataUrl(path) {
      if (!path) return ''
      if (/^https?:\/\//.test(path)) return path
      const base = currentApiBase()
      if (path.startsWith('/api/')) return `${base}${path}`
      if (window.location.protocol === 'file:') return `http://127.0.0.1:5174${path}`
      return path
    }

    function addTimestamp(url) {
      return `${url}${url.includes('?') ? '&' : '?'}ts=${Date.now()}`
    }

    const sourceFallbacks = {}

    function money(value) {
      const amount = Number(value || 0)
      if (!Number.isFinite(amount)) return '0'
      return amount.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 2 })
    }

    function formatNumber(value) {
      const amount = Number(value || 0)
      if (!Number.isFinite(amount)) return '0'
      return amount.toLocaleString('zh-CN')
    }

    function formatDateTime(value) {
      if (!value) return '待补'
      const date = new Date(value)
      if (!Number.isFinite(date.getTime())) return String(value)
      return date.toLocaleString('zh-CN', { hour12: false })
    }

    function daysBetween(value) {
      if (!value) return 0
      const date = new Date(value)
      if (!Number.isFinite(date.getTime())) return 0
      return Math.max(0, Math.floor((Date.now() - date.getTime()) / 86400000))
    }

    function normalizeText(value) {
      return String(value || '').trim().toLowerCase()
    }

    function queryMatch(fields) {
      if (!appState.query) return true
      const query = normalizeText(appState.query)
      return fields.some((field) => normalizeText(field).includes(query))
    }

    function pickTone(kind) {
      if (kind === 'danger') return 'tone-danger'
      if (kind === 'warn') return 'tone-warn'
      if (kind === 'ok') return 'tone-ok'
      if (kind === 'blue') return 'tone-blue'
      if (kind === 'purple') return 'tone-purple'
      return ''
    }

    function chunk(items, size) {
      const groups = []
      for (let index = 0; index < items.length; index += size) groups.push(items.slice(index, index + size))
      return groups
    }

    function dedupeBy(items, keyGetter) {
      const seen = new Set()
      const result = []
      items.forEach((item) => {
        const key = keyGetter(item)
        if (!key || seen.has(key)) return
        seen.add(key)
        result.push(item)
      })
      return result
    }

    function asArray(source, keys = []) {
      if (Array.isArray(source)) return source
      if (!source || typeof source !== 'object') return []
      for (const key of keys) {
        const value = source[key]
        if (Array.isArray(value)) return value
      }
      return []
    }

    function firstValue(source, keys, fallback = 0) {
      for (const key of keys) {
        const value = source && source[key]
        if (value !== undefined && value !== null && value !== '') return value
      }
      return fallback
    }

    function countRows(source, keys = []) {
      return asArray(source, keys).length
    }

    function buildRowsFromObject(source) {
      if (!source || typeof source !== 'object') return []
      return Object.entries(source).map(([key, value]) => ({
        title: key,
        detail: typeof value === 'object' ? JSON.stringify(value).slice(0, 120) : String(value),
        note: '状态字段',
      }))
    }

    function getDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('lenovo-retail-ops-terminal', 1)
        request.onupgradeneeded = () => {
          const db = request.result
          if (!db.objectStoreNames.contains('snapshots')) db.createObjectStore('snapshots')
        }
        request.onsuccess = () => resolve(request.result)
        request.onerror = () => reject(request.error)
      })
    }

    async function cacheSnapshot(key, value) {
      try {
        const db = await getDb()
        await new Promise((resolve, reject) => {
          const tx = db.transaction('snapshots', 'readwrite')
          tx.objectStore('snapshots').put({ payload: value, cachedAt: new Date().toISOString() }, key)
          tx.oncomplete = () => resolve()
          tx.onerror = () => reject(tx.error)
        })
        db.close()
      } catch {}
    }

    async function readCachedSnapshot(key) {
      try {
        const db = await getDb()
        const result = await new Promise((resolve, reject) => {
          const tx = db.transaction('snapshots', 'readonly')
          const request = tx.objectStore('snapshots').get(key)
          request.onsuccess = () => resolve(request.result || null)
          request.onerror = () => reject(request.error)
        })
        db.close()
        return result
      } catch {
        return null
      }
    }

    async function fetchJsonWithFallback(key, apiPath, fallbackPath, emptyValue = {}) {
      const apiUrl = addTimestamp(buildDataUrl(apiPath))
      const fetchOptions = { cache: 'no-store' }
      let timeoutId = null
      if (typeof AbortController === 'function') {
        const controller = new AbortController()
        fetchOptions.signal = controller.signal
        timeoutId = setTimeout(() => controller.abort(), 6000)
      }
      try {
        const response = await fetch(apiUrl, fetchOptions)
        if (timeoutId) clearTimeout(timeoutId)
        if (!response.ok) throw new Error(`api ${response.status}`)
        const payload = await response.json()
        await cacheSnapshot(key, payload)
        return payload
      } catch {
        if (timeoutId) clearTimeout(timeoutId)
        const cached = await readCachedSnapshot(key)
        if (cached && cached.payload) return cached.payload
        if (!fallbackPath) return emptyValue
        const response = await fetch(addTimestamp(buildDataUrl(fallbackPath)), { cache: 'no-store' })
        if (!response.ok) throw new Error(`fallback ${response.status}`)
        const payload = await response.json()
        await cacheSnapshot(key, payload)
        return payload
      }
    }

    async function loadSource(key, apiPath, emptyValue = {}) {
      try {
        return await fetchJsonWithFallback(key, apiPath, sourceFallbacks[key], emptyValue)
      } catch {

      }

    function buildInventoryView() {
      const inventory = appState.data.inventory || { skus: [], totals: {}, generatedAt: '' }
      const master = appState.data.inventoryMaster || { rows: [], warnings: [], exceptions: [], generatedAt: '' }
      const serialCore = appState.data.serialItems || { items: [] }
      const warranty = appState.data.warranty || { records: [] }
      const movements = appState.data.retailCoreMovements || appState.data.movements || { items: [], records: [] }
      const categoryTree = appState.data.categoryTree || { categoryNodes: [], skuMappings: [] }
      const inventorySkuMap = new Map((inventory.skus || []).map((item) => [String(item.skuKey || item.sku_key || ''), item]))
      const warrantyMap = new Map(asArray(warranty, ['records', 'items']).map((item) => [String(item.serialNumber || item.serial_number || '').toUpperCase(), item]))
      const categoryMap = new Map(asArray(categoryTree, ['skuMappings', 'items', 'records']).map((item) => [String(item.sku_key || item.skuKey || ''), item]))
      const movementRows = asArray(movements, ['items', 'records', 'movements'])
      const movementMap = new Map()
      movementRows.forEach((item) => {
        const sn = String(item.serial_number || item.serialNumber || item.sn || '').toUpperCase()
        if (!sn) return
        const list = movementMap.get(sn) || []
        list.push(item)
        movementMap.set(sn, list)
      })

      const resolveDisplayName = (...candidates) => {
        for (const candidate of candidates) {
          const value = String(candidate || '').trim()
          if (!value || /^\d{8}$/.test(value)) continue
          return value
        }
        return String(candidates.find((candidate) => String(candidate || '').trim()) || '未命名商品').trim() || '未命名商品'
      }

      const normalizeSerial = (item) => {
        const skuKey = String(item.sku_key || item.skuKey || item.sku || '').trim()
        const inventorySku = inventorySkuMap.get(skuKey) || {}
        const sn = String(item.serial_number || item.serialNumber || item.sn || '').trim()
        const warrantyItem = warrantyMap.get(sn.toUpperCase()) || {}
        const categoryMapping = categoryMap.get(skuKey) || {}
        const inboundDate = item.inbound_date || item.inboundDate || item.businessDate || inventorySku.inboundDate || ''
        const warrantyEnd = item.official_warranty_end || item.officialWarrantyEnd || warrantyItem.officialWarrantyEnd || warrantyItem.official_warranty_end || ''
        const warrantyStart = item.official_warranty_start || item.officialWarrantyStart || warrantyItem.officialWarrantyStart || warrantyItem.official_warranty_start || ''
        const ageDays = Number(item.stockAgeDays || item.stock_age_days || daysBetween(inboundDate) || 0)
        const warrantyRemainingDays = warrantyEnd ? Math.ceil((new Date(warrantyEnd).getTime() - Date.now()) / 86400000) : null
        const productName = resolveDisplayName(item.product_name, item.productName, inventorySku.productName, inventorySku.name, skuKey)
        const category = item.source_category || item.sourceCategory || inventorySku.sourceCategory || item.category || inventorySku.category || categoryMapping.category_name || categoryMapping.categoryName || categoryMapping.category || '未分类'
        const movementsForSn = movementMap.get(sn.toUpperCase()) || []
        const latestMovement = movementsForSn.slice().sort((left, right) => String(right.business_date || right.businessDate || right.created_at || '').localeCompare(String(left.business_date || left.businessDate || left.created_at || '')))[0]
        return {
          raw: item,
          skuKey,
          serialNumber: sn,
          productName,
          spec: item.spec || inventorySku.spec || inventorySku.subtitle || '*',
          pnMtm: item.pn_mtm || item.pnMtm || inventorySku.pnMtm || inventorySku.pn_mtm || '',
          category,
          cashierCategory: categoryMapping.cashier_category || categoryMapping.cashierCategory || category,
          status: item.status || inventorySku.status || 'in_stock',
          warehouse: item.warehouse_code || item.warehouseCode || item.location_name || item.locationName || item.location_code || '门店库存',
          supplierName: item.supplier_name || item.supplierName || latestMovement?.supplier_name || latestMovement?.supplierName || '供货待补',
          inboundDate,
          inboundDocumentNo: item.inbound_document_no || item.inboundDocumentNo || latestMovement?.inbound_document_no || latestMovement?.inboundDocumentNo || latestMovement?.source_ref || '',
          operatorName: item.operator_name || item.operatorName || latestMovement?.operator_name || latestMovement?.operatorName || '',
          costAmount: item.cost_amount || item.costAmount || latestMovement?.cost_amount || latestMovement?.costAmount || null,
          warrantyStatus: item.warranty_status || item.warrantyStatus || warrantyItem.status || 'missing',
          warrantyStart,
          warrantyEnd,
          warrantyPlan: item.warranty_service_plan || item.warrantyServicePlan || warrantyItem.servicePlan || '质保方案待补',
          warrantyFailureReason: item.warranty_failure_reason || item.warrantyFailureReason || warrantyItem.failureReason || '',
          warrantyRemainingDays,
          ageDays,
          movements: movementsForSn,
          latestMovement,
        }
      }

      function staleLevel(item) {
        if (item.ageDays >= 180) return { level: '一级', tone: 'danger', label: '超 180 天', action: '必须优先处理' }
        if (item.ageDays >= 100) return { level: '二级', tone: 'warn', label: '100-180 天', action: '主动推动销售' }
        if (item.ageDays >= 60) return { level: '三级', tone: 'blue', label: '60-100 天', action: '开始关注陈旧' }
        return null
      }

      function categoryScript(item, level) {
        const text = `${item.productName} ${item.spec || ''} ${item.category || ''}`.toLowerCase()
        if (text.includes('拯救者') || text.includes('游戏')) return `${level.level}预警：主推现货性能和游戏场景，搭配全量服务、抽奖或配件优惠，优先推荐给预算明确的游戏客户。`
        if (text.includes('think')) return `${level.level}预警：主推商务稳定、接口齐全和现货交付，适合办公换新、公司采购和长期使用客户。`
        if (text.includes('小新') || text.includes('yoga') || text.includes('轻薄')) return `${level.level}预警：主推轻薄便携、学习办公和性价比，适合学生、白领和家庭换机场景。`
        if (text.includes('pad') || text.includes('平板')) return `${level.level}预警：主推学习娱乐、网课和影音场景，可与键盘、支架、服务权益组合成交。`
        if (text.includes('moto') || text.includes('手机')) return `${level.level}预警：主推备用机、老人机、长续航和换新场景，重点突出到手价。`
        return `${level.level}预警：优先做组合销售、陈列曝光和活动绑定，避免继续占用库存资金。`
      }

      function warrantyLevel(item) {
        const status = String(item.warrantyStatus || '').toLowerCase()
        if (item.warrantyRemainingDays !== null && item.warrantyRemainingDays < 0) return { level: '一级', tone: 'danger', label: '质保已过期', action: '销售前必须人工确认' }
        if (!item.warrantyEnd || status.includes('not_found') || status.includes('missing') || status.includes('failed')) return { level: '三级', tone: 'blue', label: '质保信息缺失', action: '先补查 SN 质保' }
        if (item.warrantyRemainingDays !== null && item.warrantyRemainingDays <= 90) return { level: '二级', tone: 'warn', label: '质保不足 90 天', action: '销售前重点说明' }
        return null
      }

      function isWarrantyAbnormal(item) {
        return Boolean(warrantyLevel(item))
      }

      function warrantyScript(item, level) {
        if (level.label === '质保已过期') return '强预警：该 SN 质保已经过期，销售前必须店长确认，并明确是否需要补服务或更换库存。'
        if (level.label === '质保不足 90 天') return '预警：该 SN 质保剩余时间偏短，成交前应核对客户用途，必要时搭配延保或服务权益说明。'
        return '提醒：该 SN 质保信息未闭环，应先补查官网质保或核对 SN 台账，避免销售后产生售后解释风险。'
      }

      function warrantyNote(item) {
        const raw = String(item.warrantyFailureReason || item.warrantyPlan || '').trim()
        if (!raw) return '质保状态待补'
        if (raw.includes('page.') || raw.includes('Target page') || raw.includes('browser has been closed') || raw.includes('Error:')) return '质保查询异常，需人工复核'
        return raw
      }

      const coreRows = asArray(serialCore, ['items', 'rows', 'records']).map(normalizeSerial)
      const masterRows = asArray(master, ['rows', 'items', 'records']).map(normalizeSerial)
      const serialRows = dedupeBy([...coreRows, ...masterRows], (item) => item.serialNumber || `${item.skuKey}-${item.productName}`)
        .filter((item) => queryMatch([item.productName, item.category, item.cashierCategory, item.pnMtm, item.skuKey, item.serialNumber, item.spec, item.supplierName]))
      const inStockRows = serialRows.filter((item) => !String(item.status || '').includes('sold') && !String(item.status || '').includes('outbound'))
      const categoryGroups = Object.entries(inStockRows.reduce((acc, item) => {
        const key = item.cashierCategory || item.category || '未分类'
        const value = acc[key] || { label: key, count: 0, stale: 0, abnormal: 0 }
        value.count += 1
        if (item.ageDays >= 60) value.stale += 1
        if (isWarrantyAbnormal(item)) value.abnormal += 1
        acc[key] = value
        return acc
      }, {})).map(([, value]) => value).sort((left, right) => right.count - left.count)
      const staleRows = inStockRows.map((item) => ({ ...item, staleLevel: staleLevel(item) })).filter((item) => item.staleLevel).sort((left, right) => right.ageDays - left.ageDays)
      const warrantyRows = inStockRows.map((item) => ({ ...item, warrantyLevel: warrantyLevel(item) })).filter((item) => item.warrantyLevel).sort((left, right) => {
        const rank = { '一级': 3, '二级': 2, '三级': 1 }
        return (rank[right.warrantyLevel.level] || 0) - (rank[left.warrantyLevel.level] || 0)
      })
      const categoryButtons = [
        { label: '全部', count: inStockRows.length, stale: staleRows.length, abnormal: warrantyRows.length },
        ...categoryGroups.slice(0, 11),
      ]
      if (!categoryButtons.some((item) => item.label === appState.inventoryCategory)) appState.inventoryCategory = '全部'
      const activeCategory = appState.inventoryCategory || '全部'
      const matchActiveCategory = (item) => activeCategory === '全部' || (item.cashierCategory || item.category || '未分类') === activeCategory
      const activeRows = inStockRows.filter(matchActiveCategory)
      const activeStaleRows = staleRows.filter(matchActiveCategory)
      const activeWarrantyRows = warrantyRows.filter(matchActiveCategory)
      const categoryButtonHtml = categoryButtons.map((item) => `
        <button type="button" class="${item.label === activeCategory ? 'active' : ''}" data-inventory-category="${escapeHtml(item.label)}">
          <strong>${escapeHtml(item.label)}</strong>
          <span>SN ${formatNumber(item.count)} · 滞销 ${formatNumber(item.stale || 0)} · 异常 ${formatNumber(item.abnormal || 0)}</span>
        </button>
      `).join('')
      const inventoryRowHtml = activeRows.slice(0, 7).map((item) => `
        <article class="inventory-detail-row">
          <div><strong>${escapeHtml(item.productName)}</strong><span>${escapeHtml(item.spec || '*')}</span><em>${escapeHtml(item.cashierCategory || item.category)} · ${escapeHtml(item.status)}</em></div>
          <div><strong>SN ${escapeHtml(item.serialNumber || '待补')}</strong><span>PN/MTM ${escapeHtml(item.pnMtm || '待补')}</span><em>SKU ${escapeHtml(item.skuKey || '待补')}</em></div>
          <div><strong>供货 ${escapeHtml(item.supplierName)}</strong><span>入库 ${escapeHtml(item.inboundDate || '待补')}</span><em>单据 ${escapeHtml(item.inboundDocumentNo || '待补')}</em></div>
          <div><strong>库龄 ${formatNumber(item.ageDays)} 天</strong><span>质保至 ${escapeHtml(item.warrantyEnd || item.warrantyStatus || '待补')}</span><em>${escapeHtml(item.latestMovement?.movement_type || item.latestMovement?.movementType || '最近流水待补')}</em></div>
        </article>
      `).join('') || '<article class="list-row"><strong>当前分类暂无在库 SN</strong><span>请切换其它分类或刷新 SQL 数据</span><em></em></article>'
      const staleRowHtml = activeStaleRows.slice(0, 7).map((item) => `
        <article class="inventory-detail-row">
          <div><strong>${escapeHtml(item.staleLevel.label)} · ${escapeHtml(item.productName)}</strong><span>${escapeHtml(item.spec || '*')}</span><em>${escapeHtml(item.cashierCategory || item.category)}</em></div>
          <div><strong>SN ${escapeHtml(item.serialNumber || '待补')}</strong><span>${escapeHtml(item.pnMtm || item.skuKey || '型号待补')}</span><em>入库 ${escapeHtml(item.inboundDate || '待补')}</em></div>
          <div><strong>库龄 ${formatNumber(item.ageDays)} 天</strong><span>${escapeHtml(item.staleLevel.action)}</span><em>供货 ${escapeHtml(item.supplierName)}</em></div>
          <div><strong>${escapeHtml(item.staleLevel.level)}场景话术</strong><span>${escapeHtml(categoryScript(item, item.staleLevel))}</span><em>优先处理该分类陈旧库存</em></div>
        </article>
      `).join('') || '<article class="list-row"><strong>当前分类暂无超期库存</strong><span>60 天以内商品不在滞销预警内展示</span><em></em></article>'
      const warrantyRowHtml = activeWarrantyRows.slice(0, 7).map((item) => `
        <article class="inventory-detail-row">
          <div><strong>${escapeHtml(item.warrantyLevel.label)} · ${escapeHtml(item.productName)}</strong><span>${escapeHtml(item.spec || '*')}</span><em>${escapeHtml(item.cashierCategory || item.category)}</em></div>
          <div><strong>SN ${escapeHtml(item.serialNumber || '待补')}</strong><span>${escapeHtml(item.pnMtm || item.skuKey || '型号待补')}</span><em>库龄 ${formatNumber(item.ageDays)} 天</em></div>
          <div><strong>保修 ${escapeHtml(item.warrantyStart || '待补')} 至 ${escapeHtml(item.warrantyEnd || '待补')}</strong><span>剩余 ${item.warrantyRemainingDays === null ? '待补' : `${formatNumber(item.warrantyRemainingDays)} 天`}</span><em>${escapeHtml(warrantyNote(item))}</em></div>
          <div><strong>${escapeHtml(item.warrantyLevel.level)}处理建议</strong><span>${escapeHtml(warrantyScript(item, item.warrantyLevel))}</span><em>${escapeHtml(item.warrantyLevel.action)}</em></div>
        </article>
      `).join('') || '<article class="list-row"><strong>当前分类暂无质保异常</strong><span>未发现质保过期、剩余不足或缺失记录</span><em></em></article>'

      const tierCount = (rows, getter, level) => rows.filter((item) => getter(item)?.level === level).length

      return [
        {
          metrics: [],
          cards: [
            {
              title: '库存查看',
              note: `${activeCategory} · ${formatNumber(activeRows.length)} 条在库 SN 明细`,
              tone: 'ok',
              html: `
                <div class="inventory-workbench">
                  <div class="inventory-category-grid">${categoryButtonHtml}</div>
                  <div class="inventory-detail-list">${inventoryRowHtml}</div>
                </div>
              `,
            },
          ],
        },
        {
          metrics: [],
          cards: [
            {
              title: '滞销预警',
              note: `${activeCategory} · 仅展示 60 天以上库存 · 一级 ${formatNumber(tierCount(staleRows, (item) => item.staleLevel, '一级'))} / 二级 ${formatNumber(tierCount(staleRows, (item) => item.staleLevel, '二级'))} / 三级 ${formatNumber(tierCount(staleRows, (item) => item.staleLevel, '三级'))}`,
              tone: 'danger',
              html: `
                <div class="inventory-workbench">
                  <div class="inventory-category-grid">${categoryButtonHtml}</div>
                  <div class="inventory-detail-list">${staleRowHtml}</div>
                </div>
              `,
            },
          ],
        },
        {
          metrics: [],
          cards: [
            {
              title: '异常预警',
              note: `${activeCategory} · 质保异常 ${formatNumber(activeWarrantyRows.length)} 条 · 已过期 ${formatNumber(tierCount(warrantyRows, (item) => item.warrantyLevel, '一级'))} / 不足90天 ${formatNumber(tierCount(warrantyRows, (item) => item.warrantyLevel, '二级'))} / 缺失 ${formatNumber(tierCount(warrantyRows, (item) => item.warrantyLevel, '三级'))}`,
              tone: 'warn',
              html: `
                <div class="inventory-workbench">
                  <div class="inventory-category-grid">${categoryButtonHtml}</div>
                  <div class="inventory-detail-list">${warrantyRowHtml}</div>
                </div>
              `,
            },
          ],
        },
      ]
    }

    function buildProtectionView() {
      const history = appState.data.protectionHistory || { items: [] }
      const current = appState.data.priceProtection || { candidates: [], quoteDate: '', generatedAt: '' }
      const items = (history.items || []).filter((item) => queryMatch([item.product_name, item.pn_mtm, item.sku_key, item.order_number]))
      const withAmount = items.filter((item) => Number(item.estimated_protection_amount || 0) > 0)
      const pending = withAmount.filter((item) => String(item.status || '') === 'pending')
      const blocked = items.filter((item) => String(item.status || '').startsWith('blocked'))
      const noNeed = items.filter((item) => String(item.status || '') === 'no_need')
      const categories = Object.entries(withAmount.reduce((acc, item) => {
        const key = item.product_name?.includes('Think') ? 'Think 系列' : item.product_name?.includes('小新') ? '小新系列' : item.product_name?.includes('拯救者') ? '拯救者系列' : '其它'
        const value = acc[key] || { label: key, count: 0, amount: 0 }
        value.count += 1
        value.amount += Number(item.estimated_protection_amount || 0)
        acc[key] = value
        return acc
      }, {})).map(([, value]) => value).sort((left, right) => right.amount - left.amount)

      return [
        {
          metrics: [
            { label: '价保记录', value: withAmount.length, note: '只保留有金额零售价保' },
            { label: '待申请', value: pending.length, note: '当前需继续处理' },
            { label: '阻塞项', value: blocked.length, note: '缺报价或缺成本' },
            { label: '累计金额', value: money(withAmount.reduce((sum, item) => sum + Number(item.estimated_protection_amount || 0), 0)), note: '零售价保金额汇总' },
          ],
          cards: [

              tone: 'danger',
              summary: [

                { label: '扫描条数', value: current.quoteCount || 0, note: '分销群报价输入' },
                { label: '匹配 SKU', value: current.matchedSkuCount || 0, note: '进入价保链的匹配数' },
                { label: '无需价保', value: noNeed.length, note: '仅用于对账，不进申请' },
              ],
            },
            {
              title: '待处理价保',
              tone: 'warn',
              list: pending.slice(0, 6).map((item) => ({
                title: item.product_name,
                detail: `价保 ${money(item.estimated_protection_amount)} / 单号 ${item.order_number}`,
                note: `${item.outbound_date || '待补'} · ${item.sku_key || '待补'}`,
              })),
            },
            {
              title: '阻塞明细',
              tone: 'purple',
              list: blocked.slice(0, 6).map((item) => ({
                title: item.product_name,
                detail: `${item.status} · 单号 ${item.order_number}`,
                note: `${item.source_quote_file || '源文件待补'}`,
              })),
            },
            {
              title: '金额最高',
              tone: 'ok',
              list: withAmount.slice().sort((left, right) => Number(right.estimated_protection_amount || 0) - Number(left.estimated_protection_amount || 0)).slice(0, 6).map((item) => ({
                title: item.product_name,
                detail: `${money(item.estimated_protection_amount)} / 成本 ${money(item.inventory_average_cost || item.inbound_cost_amount || 0)}`,
                note: `${item.protection_quote_date || '待补'} · ${item.serial_numbers_json || 'SN 待补'}`,
              })),
            },
          ],
        },
        {
          metrics: [
            { label: '待申请', value: pending.length, note: '零售价保申请池' },
            { label: '当日出库', value: pending.filter((item) => String(item.outbound_date || '').startsWith('2026-05-27')).length, note: '今日申请池' },
            { label: '高金额单', value: pending.filter((item) => Number(item.estimated_protection_amount || 0) >= 200).length, note: '优先处理' },
            { label: '检索结果', value: pending.length, note: appState.query ? '按检索过滤' : '全部待处理' },
          ],
          cards: [
            {
              title: '申请队列',
              tone: 'danger',
              list: pending.slice(0, 6).map((item) => ({
                title: item.product_name,
                detail: `${money(item.estimated_protection_amount)} / ${item.order_number}`,
                note: `${item.outbound_date || '待补'} · ${item.source_note || '来源待补'}`,
              })),
            },
            {
              title: '报价证据',
              tone: 'blue',
              list: pending.slice(0, 6).map((item) => ({
                title: item.product_name,
                detail: item.source_quote_file || '报价文件待补',
                note: `${item.protection_quote_date || '待补'} · ${item.sku_key || '待补'}`,
              })),
            },
            {
              title: '出库链路',
              tone: 'ok',
              list: pending.slice(0, 6).map((item) => ({
                title: item.product_name,
                detail: `${item.outbound_date || '待补'} · ${item.outbound_movement_ids_json || '流水待补'}`,
                note: `${item.serial_numbers_json || 'SN 待补'}`,

            {
              title: '成本对比',
              tone: 'warn',
              list: pending.slice(0, 6).map((item) => ({
                title: item.product_name,
                detail: `进货 ${money(item.realtime_purchase_price)} / 库存成本 ${money(item.inventory_average_cost)}`,
                note: `差额 ${money(item.unit_diff)} / 数量 ${formatNumber(item.quantity)}`,

            { label: '有金额', value: withAmount.length, note: '可汇总金额' },
            { label: '无需价保', value: noNeed.length, note: '仅对账保留' },
            { label: '最新刷新', value: formatDateTime(current.generatedAt || history.generatedAt), note: '价保链刷新时间' },
          ],
          cards: [
            {
              title: '历史明细',
              tone: 'purple',
              list: items.slice(0, 6).map((item) => ({
                title: item.product_name,
                detail: `${item.status} / ${money(item.estimated_protection_amount)}`,
                note: `${item.outbound_date || '待补'} · ${item.order_number || '待补'}`,
              })),
            },
            {
              title: '系列汇总',
              tone: 'ok',
              list: categories.slice(0, 6).map((item) => ({
                title: item.label,
                detail: `金额 ${money(item.amount)} / 条数 ${formatNumber(item.count)}`,
                note: '营销与分类保留',
              })),
            },
            {

              })),
            },
          ],
        },
        {
          metrics: [
            { label: '小新系列', value: categories.find((item) => item.label === '小新系列')?.count || 0, note: '营销保留' },
            { label: '拯救者', value: categories.find((item) => item.label === '拯救者系列')?.count || 0, note: '营销保留' },
            { label: 'Think', value: categories.find((item) => item.label === 'Think 系列')?.count || 0, note: '营销保留' },
            { label: '其它', value: categories.find((item) => item.label === '其它')?.count || 0, note: '营销保留' },
          ],
          cards: [
            {
              title: '营销分类汇总',
              tone: 'danger',
              list: categories.slice(0, 6).map((item) => ({
                title: item.label,
                detail: `金额 ${money(item.amount)}`,
                note: `条数 ${formatNumber(item.count)}`,
              })),
            },
            {
              title: '小新价保',
              tone: 'ok',

    function buildMovementView() {
      const movements = appState.data.retailCoreMovements || appState.data.movements || { records: [], items: [], generatedAt: '' }
      const normalizeMovement = (item) => {
        const movementType = item.movementType || item.movement_type || ''
        const businessDate = item.businessDate || item.business_date || item.pay_time || item.operate_time || ''
        const documentNumber = item.documentNumber || item.document_no || item.documentNo || item.source_ref || item.inbound_document_no || item.id || ''
        const productName = item.productName || item.product_name || item.name || item.sku_name || item.skuKey || item.sku_key || '未命名商品'
        const supplierName = item.supplierName || item.supplier_name || item.storeName || item.store_name || item.shop_name || item.company_name || ''
        const sourceDocumentType = item.sourceDocumentType || item.source_document_type || item.service_type_name || item.movement_type_name || ''
        const quantity = Number(item.quantity || 0)
        return {
          ...item,
          movementType,
          businessDate,
          documentNumber,
          productName,
          supplierName,
          sourceDocumentType,
          skuKey: item.skuKey || item.sku_key || item.sku_no || '',
          pnMtm: item.pnMtm || item.pn_mtm || '',
          category: item.category || item.jd_subcategory || item.source_category || '未分类',
          storeName: item.storeName || item.store_name || item.shop_name || '',
          quantity,
        }
      }
      const records = asArray(movements, ['items', 'records', 'movements'])
        .map(normalizeMovement)
        .filter((item) => queryMatch([item.productName, item.pnMtm, item.documentNumber, item.skuKey, item.supplierName]))
      const inbound = records.filter((item) => String(item.movementType || '').includes('purchase'))
      const outbound = records.filter((item) => String(item.movementType || '').includes('sale') || String(item.movementType || '').includes('outbound'))
      const other = records.filter((item) => !String(item.movementType || '').includes('purchase') && !String(item.movementType || '').includes('sale'))
      const latestDate = records.reduce((value, item) => String(item.businessDate || '') > value ? String(item.businessDate || '') : value, '')
      const todayRecords = records.filter((item) => String(item.businessDate || '') === latestDate)
      const topSales = Object.entries(outbound.reduce((acc, item) => {
        const key = item.productName || item.skuKey || '未命名'
        const value = acc[key] || { label: key, qty: 0, category: item.category || '未分类' }
        value.qty += Number(item.quantity || 0)
        acc[key] = value
        return acc
      }, {})).map(([, value]) => value).sort((left, right) => right.qty - left.qty)
      const seriesTop = Object.entries(records.reduce((acc, item) => {
        const name = String(item.productName || '')
        const key = name.includes('Think') ? 'Think' : name.includes('小新') ? '小新' : name.includes('拯救者') ? '拯救者' : name.includes('YOGA') ? 'YOGA' : item.category || '其它'
        const value = acc[key] || { label: key, qty: 0 }
        value.qty += Number(item.quantity || 0)
        acc[key] = value
        return acc
      }, {})).map(([, value]) => value).sort((left, right) => right.qty - left.qty)

      return [
        {
          metrics: [
            { label: '最新业务日', value: latestDate || '待补', note: '当前流水口径' },
            { label: '当日流水', value: todayRecords.length, note: '最新业务日记录数' },

              tone: 'danger',

                detail: item.retailPrice ? `零售 ${money(item.retailPrice)}` : item.price ? `价格 ${money(item.price)}` : '价格待补',

            {
              title: '渠道审计',

              list: auditRows.slice(0, 6).map((item) => ({

                note: item.channel || item.platform || item.pnMtm || '渠道待补',
              })),
            },
            {
              title: '手工覆盖',
              tone: 'blue',
              list: asArray(appState.data.manualOverrides, ['items', 'records', 'overrides']).slice(0, 6).map((item) => ({
                title: item.productName || item.skuKey || item.pnMtm || '覆盖记录',

              title: '门店活动',
              tone: 'ok',
              list: asArray(appState.data.storeManualPromotions, ['items', 'records', 'promotions']).slice(0, 6).map((item) => ({
                title: item.productName || item.title || item.skuKey || '活动记录',
                detail: item.amount ? `优惠 ${money(item.amount)}` : (item.activityName || item.name || '活动'),
                note: item.startDate || item.endDate || item.updatedAt || '日期待补',
              })),
            },
          ],
        },
        {
          metrics: [
            { label: '证据回放', value: formatNumber(replays.length), note: '可复核' },
            { label: '来源链接', value: formatNumber(firstValue(overview, ['sourceLinkCount'], 0)), note: '平台链接' },
            { label: '证据数', value: formatNumber(firstValue(overview, ['evidenceCount'], 0)), note: '原始证据' },
            { label: '更新时间', value: formatDateTime(overview.generatedAt), note: '产品库快照' },
          ],
          cards: [
            {
              title: '证据回放',
              tone: 'purple',
              list: replays.slice(0, 6).map((item) => ({
                title: item.title || item.productName || item.replayId || '回放记录',
                detail: item.status || item.result || item.source || '状态待补',
                note: item.createdAt || item.created_at || item.updatedAt || '时间待补',
              })),
            },
            {
              title: '来源链接',
              tone: 'blue',
              list: asArray(appState.data.productUrlLocks, ['items', 'locks', 'records']).slice(0, 6).map((item) => ({
                title: item.productName || item.title || item.skuKey || '链接记录',
                detail: item.platform || item.channel || item.source || '平台待补',
                note: item.url || item.productUrl || '链接待补',
              })),
            },
            {
              title: '采集证据',
              tone: 'ok',
              list: buildRowsFromObject(overview.evidence || {}).slice(0, 6),
            },
            {
              title: '回放处理',
              tone: 'warn',
              list: [
                { title: '只复核可见证据', detail: '不把旧文件写成今日采集', note: '遵守真实采集口径' },
                { title: '链接异常先阻塞', detail: '不乱写错商品链接', note: '保护商品库' },
                { title: '批量归集再同步', detail: '避免单条改动破坏快照', note: '统一重建' },
              ],
            },
          ],
        },
      ]
    }

    function createMetricCard(item) {
      return `
        <article class="metric-card">
          <span>${item.label}</span>
          <strong>${item.value}</strong>
          <em>${item.note}</em>
        </article>
      `
    }

    function createMiniCard(item) {
      return `
        <article class="mini-card">
          <span>${item.label}</span>
          <strong>${item.value}</strong>
          <em>${item.note}</em>
        </article>
      `
    }

    function createListRow(item, tone) {
      return `
        <article class="list-row">
          <strong class="${pickTone(tone)}">${item.title || '待补'}</strong>
          <span>${item.detail || '待补'}</span>
          <em>${item.note || ''}</em>
        </article>
      `
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]))
    }

    function createSectionCard(card) {
      const toneClass = pickTone(card.tone)
      const inner = card.actions
        ? `<div class="action-list">${card.actions.map((action) => `<button type="button" data-href="${action.href}">${action.label}</button>`).join('')}</div>`
        : card.html
          ? card.html
        : card.summary
        ? `<div class="summary-grid">${card.summary.map(createMiniCard).join('')}</div>`
        : `<div class="list-stack">${(card.list || []).length ? card.list.map((item) => createListRow(item, card.tone)).join('') : '<article class="list-row"><strong>暂无数据</strong><span>当前筛选下没有可显示条目</span><em>等待后续同步</em></article>'}</div>`
      return `
        <article class="section-card ${card.tone === 'danger' ? 'hero' : ''}">
          <div class="section-head">
            <strong class="${toneClass}">${card.title}</strong>
            <span>${card.note || ''}</span>
          </div>
          ${inner}
        </article>
      `
    }

    function getModulePages() {
      if (appState.moduleKey === 'retail') return buildRetailView()
      if (appState.moduleKey === 'overview') return buildOverviewView()
      if (appState.moduleKey === 'serials') return buildInventoryView()
      if (appState.moduleKey === 'prices') return buildProtectionView()
      if (appState.moduleKey === 'sources') return buildQuoteView()
      if (appState.moduleKey === 'movements') return buildMovementView()
      if (appState.moduleKey === 'integration') return buildIntegrationView()
      if (appState.moduleKey === 'productLibrary') return buildProductLibraryView()
      return buildRetailView()
    }

    function renderAll() {
      renderModuleNav()
      const moduleConfig = moduleCatalog[appState.moduleKey]
      const modulePages = getModulePages()
      const pageIndex = Math.min(appState.pageByModule[appState.moduleKey] || 0, modulePages.length - 1)
      appState.pageByModule[appState.moduleKey] = pageIndex
      const currentPage = modulePages[pageIndex]
      document.getElementById('screen').classList.toggle('module-serials', appState.moduleKey === 'serials')

      document.getElementById('boardTitle').textContent = moduleConfig.title
      document.getElementById('boardSubtitle').textContent = moduleConfig.subtitle
      document.getElementById('boardSignal').textContent = `${moduleConfig.pages[pageIndex]} · ${appState.query ? `检索 ${appState.query}` : '全部'}`
      document.getElementById('metricsGrid').innerHTML = currentPage.metrics.map(createMetricCard).join('')
      document.getElementById('subnav').innerHTML = moduleConfig.pages.map((label, index) => `
        <button type="button" class="${index === pageIndex ? 'active' : ''}" data-page="${index}">${label}</button>
      `).join('')
      document.querySelectorAll('#subnav [data-page]').forEach((button) => {
        button.addEventListener('click', () => {
          appState.pageByModule[appState.moduleKey] = Number(button.getAttribute('data-page') || 0)
          renderAll()
        })
      })
      document.getElementById('boardBody').innerHTML = currentPage.cards.map(createSectionCard).join('')
      document.querySelectorAll('#boardBody [data-inventory-category]').forEach((button) => {
        button.addEventListener('click', () => {
          appState.inventoryCategory = button.getAttribute('data-inventory-category') || '全部'
          renderAll()
        })
      })
      document.querySelectorAll('#boardBody [data-href]').forEach((button) => {
        button.addEventListener('click', () => {
          const href = button.getAttribute('data-href')
          if (href === '#reload') {
            loadAll()
            return
          }
          if (href === '#install') {
            document.getElementById('installButton').click()
            return
          }
          location.href = href
        })
      })
      renderRail(pageIndex, currentPage)
      document.getElementById('pageIndicator').textContent = `第 ${pageIndex + 1} 页 / 共 ${modulePages.length} 页`
      document.getElementById('prevPage').disabled = pageIndex <= 0
      document.getElementById('nextPage').disabled = pageIndex >= modulePages.length - 1

      const inventory = appState.data.inventory
      const priceProtection = appState.data.priceProtection
      const distributor = appState.data.distributorQuotes
      const gray = appState.data.grayWholesale
      const movements = appState.data.movements
      const freshest = [
        inventory?.generatedAt,
        priceProtection?.generatedAt,
        distributor?.generatedAt,
        gray?.generatedAt,
        movements?.generatedAt,
        appState.data.productLibraryOverview?.generatedAt,
        appState.data.localSyncReport?.generatedAt,
      ]
        .filter(Boolean).sort().slice(-1)[0]
      document.getElementById('statusFreshness').textContent = freshest ? `最新刷新 ${formatDateTime(freshest)}` : '等待数据'
      document.getElementById('statusMode').textContent = 'SQL / API 实时映射'
      document.getElementById('footerSummary').textContent = [
        `库存 ${formatNumber(inventory?.totals?.currentStock || 0)}`,
        `价保 ${formatNumber((appState.data.protectionHistory?.items || []).filter((item) => Number(item.estimated_protection_amount || 0) > 0).length)}`,
        `群报价 ${formatNumber(distributor?.quoteCount || 0)}`,
        `公众号 ${formatNumber(gray?.quoteCount || 0)}`,
        `流水 ${formatNumber((movements?.records || []).length)}`,
        `产品库 ${formatNumber(appState.data.productLibraryOverview?.productMasterCount || 0)}`,
        `同步缺口 ${formatNumber(countRows(appState.data.syncGapQueue, ['items', 'records', 'gaps']))}`,
      ].join(' · ')
    }

    async function loadAll() {
      const apiBase = currentApiBase() || '同源 API'
      document.getElementById('boardSignal').textContent = `正在读取 SQL / API 数据链`
      document.getElementById('statusFreshness').textContent = `SQL API：${apiBase}`
      const sources = [
        ['dashboardSummary', '/api/dashboard/summary', {}],
        ['retailZone', '/api/inventory-quote/retail-zone', {}],
        ['publishedProjection', '/api/inventory-quote/published-product-projection', {}],
        ['marketingBoostHero', '/api/inventory-quote/marketing-boost-hero', {}],
        ['storeManualPromotions', '/api/inventory-quote/store-manual-promotions', { items: [] }],
        ['productActivities', '/api/inventory-quote/product-activities', { items: [] }],
        ['inventory', '/api/inventory-quote/inventory', { skus: [], totals: {} }],
        ['inventoryMaster', '/api/inventory-quote/inventory-master', { rows: [], warnings: [], exceptions: [] }],
        ['serialItems', '/api/retail-core/serial-items?limit=1500', { items: [] }],
        ['warranty', '/api/inventory-quote/warranty', { items: [] }],
        ['priceSignals', '/api/inventory-quote/price-signals', { items: [] }],
        ['priceProtection', '/api/inventory-quote/price-protection', { candidates: [] }],
        ['protectionHistory', '/api/retail-core/sales-price-protection-history?limit=120', { items: [] }],
        ['educationAgentScan', '/api/inventory-quote/education-agent-scan', { items: [] }],
        ['manualOverrides', '/api/inventory-quote/manual-overrides', { items: [] }],
        ['productUrlLocks', '/api/inventory-quote/product-url-locks', { items: [] }],
        ['distributorQuotes', '/api/inventory-quote/distributor-quotes', { quotes: [] }],
        ['grayWholesale', '/api/inventory-quote/gray-wholesale', { quotes: [] }],
        ['competitor', '/api/inventory-quote/competitor-monitor', { brands: [] }],
        ['movements', '/api/inventory-quote/inventory-movements', { records: [] }],
        ['retailCoreStatus', '/api/retail-core/status', {}],
        ['categoryTree', '/api/retail-core/category-tree', { items: [] }],
        ['retailCoreMovements', '/api/retail-core/inventory-movements', { items: [] }],
        ['salesOrders', '/api/retail-core/sales-orders', { items: [] }],
        ['orderSyncRegistry', '/api/retail-core/order-sync-registry', { items: [] }],
        ['syncGapQueue', '/api/retail-core/sync-gap-queue', { items: [] }],
        ['syncTasks', '/api/sync/tasks', { items: [] }],
        ['localSyncPipelines', '/api/local-sync/pipelines', { pipelines: [] }],
        ['localSyncReport', '/api/local-sync/latest-report', {}],
        ['localSyncFailureQueue', '/api/local-sync/failure-queue', { items: [] }],
        ['scheduledOverview', '/api/scheduled-task-console/overview', { tasks: [] }],
        ['scheduledRunnerStatus', '/api/scheduled-task-console/overview', {}],
        ['productLibraryOverview', '/api/product-library/overview', {}],
        ['productLibraryCategories', '/api/product-library/categories', { categories: [] }],
        ['productLibraryProducts', '/api/product-library/products', { products: [] }],
        ['productLibraryPricing', '/api/product-library/pricing-governance', { items: [] }],
        ['productLibraryProjection', '/api/product-library/published-projection', { items: [] }],
        ['productLibraryProjectionAudit', '/api/product-library/published-projection/audit', { items: [] }],
        ['productLibraryReplays', '/api/product-library/replays', { replays: [] }],
      ]
      let completed = 0
      const queue = sources.slice()
      const workerCount = Math.min(4, queue.length)
      const runWorker = async () => {
        while (queue.length) {
          const [key, path, emptyValue] = queue.shift()
          appState.data[key] = await loadSource(key, path, emptyValue)
          completed += 1
          document.getElementById('boardSignal').textContent = `SQL/API 已加载 ${completed}/${sources.length}`
          document.getElementById('storeName').textContent = appState.data.inventory?.storeName || '联想体验店（新野县书院路）'
          renderAll()
          await new Promise((resolve) => setTimeout(resolve, 12))
        }
      }
      await Promise.all(Array.from({ length: workerCount }, runWorker))
      document.getElementById('boardSignal').textContent = 'SQL/API 数据已同步'
      renderAll()
    }

    function setupInstall() {
      window.addEventListener('beforeinstallprompt', (event) => {
        event.preventDefault()
        appState.installPrompt = event
        document.getElementById('installBanner').classList.add('show')
      })
      window.addEventListener('appinstalled', () => {
        appState.installPrompt = null
        document.getElementById('installBanner').classList.remove('show')
        document.getElementById('statusInstall').textContent = '已安装到桌面'
      })
      document.getElementById('installButton').addEventListener('click', async () => {
        if (!appState.installPrompt) return
        appState.installPrompt.prompt()
        await appState.installPrompt.userChoice.catch(() => null)
      })
    }

    function setupEvents() {
      document.getElementById('refreshButton').addEventListener('click', loadAll)
      document.getElementById('modeCashier').addEventListener('click', () => {
        appState.forcedMode = appState.forcedMode === 'cashier' ? 'auto' : 'cashier'
        writeModeQuery(appState.forcedMode)
        fitViewport()
      })
      document.getElementById('modeMobile').addEventListener('click', () => {
        appState.forcedMode = appState.forcedMode === 'mobile' ? 'auto' : 'mobile'
        writeModeQuery(appState.forcedMode)
        fitViewport()
      })
      document.getElementById('globalSearch').addEventListener('input', (event) => {
        appState.query = event.target.value.trim()
        renderAll()
      })
      document.getElementById('prevPage').addEventListener('click', () => {
        appState.pageByModule[appState.moduleKey] = Math.max(0, (appState.pageByModule[appState.moduleKey] || 0) - 1)
        renderAll()
      })
      document.getElementById('nextPage').addEventListener('click', () => {
        const pages = getModulePages()
        appState.pageByModule[appState.moduleKey] = Math.min(pages.length - 1, (appState.pageByModule[appState.moduleKey] || 0) + 1)
        renderAll()
      })
      window.addEventListener('resize', fitViewport)
    }

    const modeQuery = new URL(window.location.href).searchParams.get('mode')
    if (modeQuery === 'cashier' || modeQuery === 'mobile') appState.forcedMode = modeQuery
    fitViewport()
    renderModuleNav()
    setupInstall()
    setupEvents()
    registerServiceWorker()
    renderAll()
    loadAll()
  </script>
