<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=./after-sales-pure.html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>售后服务页面迁移中</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "SF Pro SC","PingFang SC","Microsoft YaHei",sans-serif;
      background: #07090f;
      color: #f5efe5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(245, 176, 64, .20), transparent 42%),
        linear-gradient(180deg, #14080a 0%, #07090f 100%);
    }
    .panel {
      width: min(92vw, 720px);
      padding: 40px 36px;
      border-radius: 28px;
      text-align: center;
      border: 1px solid rgba(247, 201, 107, .24);
      background: rgba(18, 11, 15, .92);
      box-shadow: 0 22px 60px rgba(0, 0, 0, .38);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(30px, 3vw, 44px);
      color: #ffe2a2;
    }
    p {
      margin: 0;
      font-size: clamp(16px, 1.3vw, 22px);
      line-height: 1.7;
      color: rgba(255,255,255,.82);
    }
    a {
      color: #ffd36f;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>售后服务模块已迁移</h1>
    <p>正在自动跳转到纯净页面 <a href="./after-sales-pure.html">after-sales-pure.html</a>，中间版本逻辑已停用。</p>
  </main>
