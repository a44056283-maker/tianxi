# 复制为 config/selectors.yaml 后，根据实际智店通页面修改。
# 只配置白名单页面和只读动作。

entities:
  orders:
    enabled: true
    description: "销售订单列表"
    start_url: "/"
    menu_selector: "text=销售订单"
    frame_selector: null
    wait_selector: "table tbody tr"
    dangerous_texts:
      - "新增"
      - "删除"
      - "提交"
      - "审核"
      - "确认"
      - "付款"
      - "退款"
      - "作废"
      - "保存"
    filters:
      start_date: "input[name='startDate']"
      end_date: "input[name='endDate']"
      store: "select[name='store']"
      status: null
      search_button: "button:has-text('查询')"
    table:
      rows: "table tbody tr"
      cells: "td"
      next_page: "button:has-text('下一页')"
      next_page_disabled_attr: "disabled"
      max_pages: 200
      columns:
        - order_no
        - order_time
        - store_code
        - sku
        - product_name
        - qty
        - amount
        - status
      record_id_fields:
        - order_no
        - sku
    export:
      button: null
      download_timeout_ms: 120000
      file_type: "xlsx"
    network:
      capture_url_contains: null
      json_path: null

  inventory:
